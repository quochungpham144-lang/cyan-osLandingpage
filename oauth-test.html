<!DOCTYPE html>
<html>
<head>
    <title>OAuth Test</title>
</head>
<body>
    <h1>Google OAuth Test</h1>
    
    <button onclick="testOAuth()">
        Test Google OAuth
    </button>
    
    <script>
        function testOAuth() {
            const googleOAuthUrl = 'https://accounts.google.com/oauth/authorize?' +
                'client_id=464363772737-silqko8n7qq49f1ikg5o23t33ds4nh11.apps.googleusercontent.com&' +
                'redirect_uri=http://localhost:5173&' +
                'response_type=code&' +
                'scope=openid%20email%20profile&' +
                'prompt=consent';
            
            console.log('Testing OAuth URL:', googleOAuthUrl);
            window.location.href = googleOAuthUrl;
        }
    </script>
</body>
</html>
